<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show Debug</title>
</head>
<body>
    <h3>請開啟瀏覽器的開發者工具 (Developer Tools) 來查看 Console 視窗。</h3>
    <p>Windows 快速鍵：按 F12 或 Ctrl + Shift + J</p>
    <p>Mac 快速鍵：按 Cmd + Option + J</p>

    <script>
        // 使用 console.log() 將訊息輸出到除錯視窗 (Console) 中
        console.log("Hello JavaScript");
    </script>
</body>
</html>
