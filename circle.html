<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁繪圖作業</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

    </style>
</head>
<body>

    <h1>圓形與矩形</h1>
    
    <canvas id="myCanvas" width="500" height="400"></canvas>

    <script>
        // 1. 取得畫布元素
        var canvas = document.getElementById("myCanvas");
        // 2. 取得 2D 繪圖上下文
        var ctx = canvas.getContext("2d");

        // --- 繪製矩形 (正方形) ---
        // 設定填充顏色為藍色
        ctx.fillStyle = "blue";
        // 繪製一個實心矩形 (x, y, 寬, 高)
        // 這裡我們畫一個 200x200 的正方形，起始點在 (50, 50)
        ctx.fillRect(50, 50, 200, 200);

        // --- 繪製圓形 ---
        // 開啟新路徑
        ctx.beginPath();
        // 繪製圓弧 (圓心x, 圓心y, 半徑, 起始角度, 結束角度, 是否逆時針)
        // 這裡我們畫一個半徑 80 的圓，圓心在 (230, 150)，使其與矩形重疊
        ctx.arc(230, 150, 80, 0, 2 * Math.PI);
        // 設定填充顏色為黃色
        ctx.fillStyle = "yellow";
        // 填充圓形內部
        ctx.fill();
        // 設定邊框顏色為紅色
        ctx.strokeStyle = "red";
        // 設定邊框寬度
        ctx.lineWidth = 5;
        // 繪製圓形邊框
        ctx.stroke();
        // 關閉路徑
        ctx.closePath();

    </script>

</body>
</html>
