<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺灣海域漁獲動態視覺圖 - 期末專案</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --google-blue: #1a73e8;
            --ocean-dark: #005b9f;
            --panel-shadow: 0 1px 2px rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15);
            --text-main: #3c4043;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            overflow: hidden;
        }

        /* 3. KEE#B - 全螢幕地圖容器 */
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* 1. 網頁標頭 - Google Maps 搜尋欄樣式 */
        .google-header {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 1000;
            background: white;
            width: 392px;
            border-radius: 8px;
            box-shadow: var(--panel-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header-top {
            display: flex;
            align-items: center;
            padding: 12px 16px;
        }
        .project-title {
            font-size: 18px;
            color: var(--text-main);
            flex-grow: 1;
            font-weight: 500;
        }
        .sdg-badge {
            width: 32px;
            height: 32px;
            background-color: #0a97d9; /* SDG 14 Color */
            color: white;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
        }

        /* 2. 理念介紹區塊 - 摺疊式面板樣式 */
        .hero-section {
            padding: 0 16px 12px 16px;
            font-size: 13px;
            color: #70757a;
            border-top: 1px solid #e8eaed;
            padding-top: 10px;
        }

        /* 四季切換控制項 - 地圖右側浮動按鈕 */
        .season-controls {
            position: absolute;
            right: 12px;
            top: 12px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .season-btn {
            background: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            box-shadow: var(--panel-shadow);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.2s;
        }
        .season-btn.active {
            background-color: var(--google-blue);
            color: white;
        }

        /* 4. 動態資訊展示區 - 側邊浮動卡片 */
        .info-card {
            position: absolute;
            left: 12px;
            top: 160px; /* 位於標頭下方 */
            z-index: 1000;
            width: 392px;
            background: white;
            border-radius: 8px;
            box-shadow: var(--panel-shadow);
            max-height: calc(100% - 200px);
            overflow-y: auto;
            display: none; /* 點擊後才顯示 */
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .info-card-header {
            padding: 16px;
            border-bottom: 1px solid #e8eaed;
        }
        .fish-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }
        .status-normal { background: #e6f4ea; color: #1e8e3e; }
        .status-warn { background: #fce8e6; color: #d93025; }
        
        .info-content { padding: 16px; }
        .fish-img-box {
            width: 100%;
            height: 180px;
            background: #f1f3f4;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #70757a;
        }
        .eco-label {
            display: inline-block;
            background: #f1f3f4;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            margin-bottom: 12px;
        }
        .eco-list {
            margin: 0; padding-left: 20px;
            font-size: 14px; line-height: 1.6;
            color: var(--text-main);
        }

        /* 5. 頁尾區塊 - 仿 Google 地圖底部版權欄 */
        .mini-footer {
            position: absolute;
            bottom: 0;
            right: 0;
            background: rgba(255,255,255,0.8);
            padding: 2px 8px;
            font-size: 11px;
            color: #70757a;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="google-header">
        <div class="header-top">
            <div class="project-title">臺灣海域漁獲動態視覺圖</div>
            <div class="sdg-badge">SDG<br>14</div>
        </div>
        <div class="hero-section">
            結合海洋保育及責任消費。旨在引導大眾「吃對海鮮」，守護正在悄悄消失的海洋資源。
        </div>
    </div>

    <div id="map"></div>

    <div class="season-controls">
        <button class="season-btn active" onclick="updateSeason('春')">春</button>
        <button class="season-btn" onclick="updateSeason('夏')">夏</button>
        <button class="season-btn" onclick="updateSeason('秋')">秋</button>
        <button class="season-btn" onclick="updateSeason('冬')">冬</button>
    </div>

    <div class="info-card" id="fishCard">
        <div class="info-card-header">
            <span style="font-size: 20px; font-weight: 500;" id="cardTitle">台灣蜆</span>
            <span class="fish-status status-normal" id="cardStatus">供給正常</span>
        </div>
        <div class="info-content">
            <div class="fish-img-box" id="cardImg">
                [照片載入中...]
            </div>
            <div class="eco-label">本地養殖</div>
            <ul class="eco-list">
                <li>屬於食物鏈中、底層生物，恢復力快。</li>
                <li>餌料來自天然植物性，低負擔。</li>
                <li>在地生產，碳足跡較低。</li>
            </ul>
        </div>
    </div>

    <div class="mini-footer">
        開發團隊：第二十組 (商逢育、李庭宇、吳絃竑) | 資料來源：臺灣魚類資料庫、海洋保育署
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地圖，中心點設在台灣
        var map = L.map('map', {
            zoomControl: false // 隱藏預設縮放鈕，維持乾淨 UI
        }).setView([23.6, 121.0], 7);

        // 使用符合海洋風的淺色地圖圖層 (仿 Google 地圖樣式)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // 自定義地圖點擊區域（範例：座標點）
        var regions = [
            { name: "西部海域", pos: [24.0, 120.0], fish: "台灣蜆", status: "供給正常" },
            { name: "東部海域", pos: [24.0, 122.0], fish: "鬼頭刀", status: "供給正常" },
            { name: "南部海域", pos: [22.0, 120.5], fish: "櫻花蝦", status: "短缺警示" }
        ];

        regions.forEach(function(reg) {
            var marker = L.circleMarker(reg.pos, {
                color: '#1a73e8',
                fillColor: '#1a73e8',
                fillOpacity: 0.6,
                radius: 10
            }).addTo(map);

            marker.on('click', function() {
                showFishDetail(reg);
            });
        });

        function showFishDetail(data) {
            document.getElementById('cardTitle').innerText = data.fish;
            document.getElementById('cardStatus').innerText = data.status;
            
            // 變更狀態顏色
            const statusEl = document.getElementById('cardStatus');
            if(data.status === "短缺警示") {
                statusEl.className = "fish-status status-warn";
            } else {
                statusEl.className = "fish-status status-normal";
            }

            document.getElementById('fishCard').style.display = 'block';
        }

        function updateSeason(season) {
            // 更新按鈕樣式
            const btns = document.querySelectorAll('.season-btn');
            btns.forEach(b => {
                if(b.innerText === season) b.classList.add('active');
                else b.classList.remove('active');
            });
            console.log("目前季節切換至：" + season);
            // 這裡未來可以加入 logic 根據季節改變地圖上的漁獲點
        }

        // 點擊地圖其他地方隱藏資訊卡
        map.on('click', function() {
            document.getElementById('fishCard').style.display = 'none';
        });
    </script>
</body>
</html>
