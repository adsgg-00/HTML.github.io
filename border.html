<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World 邊框與背景練習</title>
    <style>
        /* 設定網頁背景與基本字體 */
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 外層帶有陰影的白色容器 */
        .container {
            background-color: white;
            padding: 40px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2); /* 模擬圖片中的陰影 */
            width: 400px;
        }

        /* 三個區塊的共同設定 */
        .box {
            font-family: "Times New Roman", Times, serif; /* 設定為襯線字體 */
            font-size: 32px;
            font-weight: bold;
            padding: 10px 20px;
            margin-bottom: 25px; /* 區塊之間的間距 */
        }

        /* 移除最後一個區塊的底部間距 */
        .box:last-child {
            margin-bottom: 0;
        }

        /* 第一個區塊：淺藍背景、雙層橘紅邊框 */
        .box-1 {
            background-color: #ADD8E6; /* 淺藍色 */
            border: 6px double #FF6347; /* 雙線邊框 (double)，顏色為番茄紅 */
        }

        /* 第二個區塊：黃色背景、藍色實線邊框、圓角 */
        .box-2 {
            background-color: #FFFF00; /* 黃色 */
            border: 4px solid #1E90FF; /* 實線邊框 (solid)，顏色為道奇藍 */
            border-radius: 15px; /* 圓角設定 */
        }

        /* 第三個區塊：綠色背景、灰色點狀邊框 */
        .box-3 {
            background-color: #3CB371; /* 中海綠色 */
            border: 8px dotted #808080; /* 點狀邊框 (dotted)，顏色為灰色 */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box box-1">Hello World</div>
        <div class="box box-2">Hello World</div>
        <div class="box box-3">Hello World</div>
    </div>

</body>
</html>
