<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designer-Engineer Collaboration</title>
    <style>
        /* The CSS is where the designer's specs come to life */
        .custom-button {
            /* Requested Specs */
            height: 22px;
            border-radius: 8px;

            /* Visual Styling (Standard designer-engineer defaults) */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            font-size: 12px;
            font-family: sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }

        .custom-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h3>H22 / R8 Button Example</h3>
    <button class="custom-button">Click Me</button>

</body>
</html>
