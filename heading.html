<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page Design</title>
    <style>
        /* 設定整體字體為類似圖片的襯線字體 */
        body {
            font-family: "Times New Roman", Times, serif;
            padding: 40px;
            max-width: 600px; /* 限制寬度讓版面看起來更像圖片的比例 */
        }

        /* 標題 1 的樣式 */
        h1 {
            border-top: 3px solid black; /* 頂部黑線 */
            padding-top: 5px;            /* 線與文字的距離 */
            text-shadow: 2px 2px 0px lightpink; /* 粉紅色文字陰影 */
            display: inline-block;       /* 讓頂線長度剛好包覆文字 */
            margin-bottom: 20px;
        }

        /* 標題 2 的樣式 */
        h2 {
            font-style: italic;          /* 斜體字 */
            border: 1px solid black;     /* 黑色內框線 */
            outline: 3px solid #d4d400;  /* 黃色外框線 */
            padding: 5px 10px;           /* 框線內的留白 */
            margin-bottom: 40px;
        }

        /* 標題 3 的樣式 */
        h3 {
            text-align: right;           /* 靠右對齊 */
            text-decoration: underline;  /* 黑色底線 */
        }
    </style>
</head>
<body>

    <h1>This is heading 1</h1>
    
    <h2>This is heading 2</h2>
    
    <h3>This is heading 3</h3>

</body>
</html>
